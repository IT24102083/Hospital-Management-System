<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments - HealthFirst</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/medical-cross.png">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(30deg); } }
        .animate-fade-in-up { animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
        .logo { display: flex; align-items: center; text-decoration: none; }
        .logo-icon { font-size: 28px; color: #2563eb; margin-right: 8px; }
        .logo-text { font-size: 24px; font-weight: 800; color: #1e293b; }
        .logo-text span { color: #2563eb; }
        .nav-link { position: relative; transition: all 0.3s ease; }
        .nav-link:after { content: ''; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0; background-color: #2563eb; transition: width 0.3s ease; }
        .nav-link.active { color: #2563eb; }
        .nav-link.active:after { width: 100%; }
        .nav-link:hover { color: #2563eb; }
        .nav-link:hover:after { width: 100%; }
        .login-btn { background: linear-gradient(to right, #1e40af, #1d4ed8); box-shadow: 0 4px 15px rgba(30, 64, 175, 0.3); transition: all 0.3s ease; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(30, 64, 175, 0.4); }
        .hero-gradient { background: linear-gradient(135deg, rgba(236, 253, 245, 0.8) 0%, rgba(14, 116, 144, 0.1) 100%); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid rgba(37, 99, 235, 0.2); border-top: 5px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; }
        .tab-btn.active { border-color: #2563eb; color: #2563eb; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
</div>

<nav id="navbar" class="fixed w-full bg-white/90 backdrop-blur-sm z-50 shadow-sm transition-all duration-300">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/" class="logo">
            <i class="fas fa-heartbeat logo-icon"></i>
            <span class="logo-text">Health<span>First</span></span>
        </a>
        <div class="hidden md:flex items-center space-x-8">
            <a href="/dashboard" class="nav-link text-gray-700 font-medium">Dashboard</a>
            <a href="/patient/appointments" class="nav-link text-gray-700 font-medium active">My Appointments</a>
        </div>
        <div class="flex items-center space-x-4">
            <div class="relative" sec:authorize="isAuthenticated()">
                <button id="userMenuBtn" class="flex items-center space-x-2 text-gray-700 hover:text-blue-600">
                    <span class="font-medium" th:text="${receptionist != null ? (receptionist.firstName + ' ' + receptionist.lastName) : 'Patient'}">Receptionist Name</span>
                    <i class="fas fa-chevron-down text-xs"></i>
                </button>
                <div id="userMenu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-50">
                    <a href="/patient/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">My Profile</a>
                    <div class="border-t border-gray-100"></div>
                    <a href="/logout" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Logout</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="min-h-screen pt-28 pb-16 hero-gradient">
    <div class="container mx-auto px-4">
        <div class="max-w-6xl mx-auto animate-fade-in-up">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">My Appointments</h1>
                    <p class="text-lg text-gray-600">View and manage your appointment history.</p>
                </div>
                <a href="/appointments/book" class="login-btn text-white font-semibold py-2 px-5 rounded-full flex items-center space-x-2">
                    <i class="fas fa-plus"></i>
                    <span>Book New</span>
                </a>
            </div>

            <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                <div class="border-b border-gray-200">
                    <div class="p-4 flex space-x-1 bg-gray-50 rounded-t-2xl">
                        <button id="upcomingTab" class="tab-btn active w-full py-3 px-4 font-semibold text-gray-700 rounded-lg transition-colors">
                            Upcoming
                        </button>
                        <button id="pastTab" class="tab-btn w-full py-3 px-4 font-semibold text-gray-700 rounded-lg transition-colors">
                            Past
                        </button>
                    </div>
                </div>

                <div id="upcomingPanel">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 text-gray-600 uppercase text-sm">
                            <tr>
                                <th class="p-4 font-semibold">Date & Time</th>
                                <th class="p-4 font-semibold">Doctor</th>
                                <th class="p-4 font-semibold">Status</th>
                                <th class="p-4 font-semibold text-right">Actions</th>
                            </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                            <tr th:each="appt : ${upcomingAppointments}">
                                <td class="p-4">
                                    <div class="font-medium text-gray-800" th:text="${#temporals.format(appt.appointmentDate, 'MMMM dd, yyyy')}"></div>
                                    <div class="text-sm text-gray-500" th:text="${#temporals.format(appt.appointmentTime, 'hh:mm a')}"></div>
                                </td>
                                <td class="p-4">
                                    <div class="font-medium text-gray-800" th:text="${'Dr. ' + appt.doctor.firstName + ' ' + appt.doctor.lastName}"></div>
                                    <div class="text-sm text-gray-500" th:text="${appt.doctor.specialization}"></div>
                                </td>
                                <td class="p-4">
                                    <span class="px-2 py-1 text-xs font-bold bg-blue-100 text-blue-800 rounded-full" th:text="${appt.status}">SCHEDULED</span>
                                </td>
                                <td class="p-4 text-right">
                                    <a th:href="@{'/appointments/cancel/' + ${appt.id}}"
                                       class="bg-red-100 hover:bg-red-200 text-red-800 font-bold py-2 px-4 rounded-full text-xs"
                                       onclick="return confirm('Are you sure you want to cancel this appointment?')">Cancel</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(upcomingAppointments)}">
                                <td colspan="4" class="p-8 text-center text-gray-500">
                                    You have no upcoming appointments.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="pastPanel" class="hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 text-gray-600 uppercase text-sm">
                            <tr>
                                <th class="p-4 font-semibold">Date & Time</th>
                                <th class="p-4 font-semibold">Doctor</th>
                                <th class="p-4 font-semibold">Status</th>
                                <th class="p-4 font-semibold text-right">Actions</th>
                            </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                            <tr th:each="appt : ${pastAppointments}">
                                <td class="p-4">
                                    <div class="font-medium text-gray-800" th:text="${#temporals.format(appt.appointmentDate, 'MMMM dd, yyyy')}"></div>
                                    <div class="text-sm text-gray-500" th:text="${#temporals.format(appt.appointmentTime, 'hh:mm a')}"></div>
                                </td>
                                <td class="p-4">
                                    <div class="font-medium text-gray-800" th:text="${'Dr. ' + appt.doctor.firstName + ' ' + appt.doctor.lastName}"></div>
                                    <div class="text-sm text-gray-500" th:text="${appt.doctor.specialization}"></div>
                                </td>
                                <td class="p-4">
                                    <span class="px-2 py-1 text-xs font-bold rounded-full"
                                          th:classappend="${appt.status.name() == 'COMPLETED' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}"
                                          th:text="${appt.status}">COMPLETED</span>
                                </td>
                                <td class="p-4 text-right">
                                    <a href="#" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-full text-xs">View Record</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(pastAppointments)}">
                                <td colspan="4" class="p-8 text-center text-gray-500">
                                    You have no past appointments.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-gray-900 text-white pt-16 pb-8">
</footer>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // --- Loading Overlay ---
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.style.opacity = '0';
        setTimeout(() => { loadingOverlay.style.display = 'none'; }, 500);

        // --- User Menu Dropdown ---
        const userMenuBtn = document.getElementById('userMenuBtn');
        const userMenu = document.getElementById('userMenu');
        if(userMenuBtn && userMenu) {
            userMenuBtn.addEventListener('click', () => userMenu.classList.toggle('hidden'));
            document.addEventListener('click', (e) => {
                if (!userMenuBtn.contains(e.target) && !userMenu.contains(e.target)) {
                    userMenu.classList.add('hidden');
                }
            });
        }

        // --- Tab Functionality ---
        const upcomingTab = document.getElementById('upcomingTab');
        const pastTab = document.getElementById('pastTab');
        const upcomingPanel = document.getElementById('upcomingPanel');
        const pastPanel = document.getElementById('pastPanel');

        upcomingTab.addEventListener('click', () => {
            upcomingTab.classList.add('active');
            pastTab.classList.remove('active');
            upcomingPanel.classList.remove('hidden');
            pastPanel.classList.add('hidden');
        });

        pastTab.addEventListener('click', () => {
            pastTab.classList.add('active');
            upcomingTab.classList.remove('active');
            pastPanel.classList.remove('hidden');
            upcomingPanel.classList.add('hidden');
        });
    });
</script>

</body>
</html>
