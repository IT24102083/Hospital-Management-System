<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">
<div class="flex h-screen bg-gray-200">
    <div class="w-64 bg-gray-800 text-white flex flex-col fixed h-full">
        <div class="px-8 py-6 text-2xl font-bold border-b border-gray-700">Admin Panel</div>
        <nav class="flex-1 px-4 py-4 space-y-2">
            <a th:href="@{/admin/dashboard}"
               class="flex items-center px-4 py-2 rounded-md hover:bg-gray-700"
               th:classappend="${currentView == 'dashboard'} ? 'bg-gray-900'">
                <i class="fas fa-tachometer-alt mr-3"></i> Dashboard
            </a>
            <a th:href="@{/admin/dashboard(view='users')}"
               class="flex items-center px-4 py-2 rounded-md hover:bg-gray-700"
               th:classappend="${currentView == 'users' or currentView == 'userForm'} ? 'bg-gray-900'">
                <i class="fas fa-users mr-3"></i> User Management
            </a>
            <a href="/logout" class="flex items-center px-4 py-2 rounded-md hover:bg-gray-700 mt-auto mb-4">
                <i class="fas fa-sign-out-alt mr-3"></i> Logout
            </a>
        </nav>
    </div>

    <main class="flex-1 ml-64 p-10 overflow-y-auto">
        <div th:if="${currentView == 'dashboard'}">
            <h1 class="text-3xl font-bold text-gray-800 mb-8">Dashboard Overview</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-lg shadow-lg">
                    <div class="flex items-center">
                        <div class="bg-blue-500 text-white p-3 rounded-full"><i class="fas fa-users fa-2x"></i></div>
                        <div class="ml-4">
                            <p class="text-lg text-gray-500">Total Users</p>
                            <p class="text-3xl font-bold text-gray-800" th:text="${totalUsers}">0</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${currentView == 'users'}">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-bold text-gray-800">User Management</h1>
                <a th:href="@{/admin/dashboard(view='addUser')}" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                    <i class="fas fa-plus mr-2"></i> Add User
                </a>
            </div>
            <div th:if="${successMessage}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-4" role="alert">
                <p th:text="${successMessage}"></p>
            </div>
            <div class="bg-white shadow-md rounded-lg overflow-x-auto">
                <table class="min-w-full bg-white">
                    <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="py-3 px-4 text-left">ID</th>
                        <th class="py-3 px-4 text-left">Username</th>
                        <th class="py-3 px-4 text-left">Full Name</th>
                        <th class="py-3 px-4 text-left">Email</th>
                        <th class="py-3 px-4 text-left">Role</th>
                        <th class="py-3 px-4 text-left">Status</th>
                        <th class="py-3 px-4 text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody class="text-gray-700">
                    <tr th:each="user : ${users}" class="border-b border-gray-200 hover:bg-gray-100">
                        <td class="py-3 px-4" th:text="${user.id}"></td>
                        <td class="py-3 px-4" th:text="${user.username}"></td>
                        <td class="py-3 px-4" th:text="${user.firstName + ' ' + user.lastName}"></td>
                        <td class="py-3 px-4" th:text="${user.email}"></td>
                        <td class="py-3 px-4"><span class="font-mono text-xs" th:text="${user.role}"></span></td>
                        <td class="py-3 px-4">
                            <span th:if="${user.active}" class="bg-green-200 text-green-800 py-1 px-3 rounded-full text-xs font-semibold">Active</span>
                            <span th:unless="${user.active}" class="bg-red-200 text-red-800 py-1 px-3 rounded-full text-xs font-semibold">Inactive</span>
                        </td>
                        <td class="py-3 px-4 text-center">
                            <a th:href="@{/admin/dashboard(view='editUser', id=${user.id})}" class="text-yellow-500 hover:text-yellow-700 mr-3" title="Edit"><i class="fas fa-pencil-alt"></i></a>
                            <a th:href="@{/admin/users/delete/{id}(id=${user.id})}" class="text-red-500 hover:text-red-700" onclick="return confirm('Are you sure you want to delete this user?')" title="Delete"><i class="fas fa-trash-alt"></i></a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div th:if="${currentView == 'userForm'}">
            <h1 class="text-3xl font-bold text-gray-800 mb-6" th:text="${formAction == 'add'} ? 'Add New User' : 'Edit User'"></h1>
            <div class="max-w-3xl bg-white p-8 rounded-lg shadow-md">
                <form th:action="${formAction == 'add'} ? @{/admin/users/add} : @{/admin/users/update/{id}(id=${user.id})}" th:object="${user}" method="post">
                    <input type="hidden" th:field="*{id}" />
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="firstName" class="block text-sm font-medium text-gray-700">First Name</label>
                            <input type="text" id="firstName" th:field="*{firstName}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                            <p th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="text-red-500 text-xs mt-1"></p>
                        </div>
                        <div>
                            <label for="lastName" class="block text-sm font-medium text-gray-700">Last Name</label>
                            <input type="text" id="lastName" th:field="*{lastName}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                            <p th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="text-red-500 text-xs mt-1"></p>
                        </div>
                        <div class="md:col-span-2">
                            <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                            <input type="text" id="username" th:field="*{username}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-red-500 text-xs mt-1"></p>
                        </div>
                        <div class="md:col-span-2">
                            <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                            <input type="email" id="email" th:field="*{email}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500 text-xs mt-1"></p>
                        </div>
                        <div class="md:col-span-2">
                            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                            <input type="password" id="password" name="password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" th:placeholder="${formAction == 'edit'} ? 'Leave blank to keep current password' : ''">
                        </div>
                        <div>
                            <label for="phoneNumber" class="block text-sm font-medium text-gray-700">Phone Number</label>
                            <input type="text" id="phoneNumber" th:field="*{phoneNumber}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                        </div>
                        <div>
                            <label for="address" class="block text-sm font-medium text-gray-700">Address</label>
                            <input type="text" id="address" th:field="*{address}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                        </div>
                        <div>
                            <label for="role" class="block text-sm font-medium text-gray-700">Role</label>
                            <select id="role" th:field="*{role}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                                <option th:each="roleOpt : ${roles}" th:value="${roleOpt}" th:text="${roleOpt.name().replace('ROLE_', '')}"></option>
                            </select>
                        </div>
                        <div class="flex items-end">
                            <div class="flex items-center h-full">
                                <input id="active" type="checkbox" th:field="*{active}" class="h-4 w-4 text-indigo-600 border-gray-300 rounded">
                                <label for="active" class="ml-2 block text-sm text-gray-900">Is Active</label>
                            </div>
                        </div>
                    </div>
                    <div class="mt-8 flex justify-end">
                        <a th:href="@{/admin/dashboard(view='users')}" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded mr-2">Cancel</a>
                        <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
